stages:
  - test
  - bump-version
  - deploy
  - release
  - publish

.git-setup:
  before_script:
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"
    - git fetch origin --tags
    - git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH

test-android-sdk:
  image: cimg/android:2024.07.1
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
      changes:
        - sdk/**
      when: always
  script:
    - bash gradlew check

# ==================== Shared Version Bump ====================
# One job bumps sdk.version for BOTH platforms (they share gradle.properties).
# Uses simple semver minor increment — no git-cliff for version computation.

bump-version-sdk:
  image:
    name: alpine/git
    entrypoint: [""]
  stage: bump-version
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
    GITHUB_TOKEN: $GITHUB_ACCESS_TOKEN
  before_script:
    - apk add git-cliff sed
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"
    - git fetch origin --tags
    - git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH
  script:
    # --include-path is intentionally omitted here: combining it with [remote.github]
    # causes git-cliff to pull historical feat: commits from the GitHub API for
    # path-matched processing, inflating the bump to MINOR even for fix-only changes.
    # Job rules already gate on sdk/** changes so the filter is redundant for triggering.
    - NEW_VERSION_TAG=$(git-cliff --repository "." --tag-pattern "android-sdk-v.*" --bumped-version)
    - NEW_VERSION=$(echo $NEW_VERSION_TAG | sed -r "s/android-sdk-v(.*)/\1/")
    - echo "Bumping version to $NEW_VERSION"
    - sed -i "s/^sdk\.version=.*/sdk.version=$NEW_VERSION/" gradle.properties
    - sed -i "s/spec\.version\s*=\s*'[^']*'/spec.version                  = '$NEW_VERSION'/" sdk/NoctuaInternalSDK.podspec
    - sed -i "s/spec\.version\s*=\s*'[^']*'/spec.version                  = '$NEW_VERSION'/" sdk/ios-sdk/release/NoctuaInternalSDK.podspec
    - sed -i "s|spec\.source\s*=.*|spec.source                   = { :git => 'https://github.com/NoctuaLabs/noctua-internal-native-sdk.git', :tag => 'ios-sdk-v$NEW_VERSION' }|" sdk/ios-sdk/release/NoctuaInternalSDK.podspec
    - REMOTE_URL="https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git"
    - if [ -n "$(git diff --name-only HEAD -- gradle.properties)" ]; then
        git add gradle.properties sdk/NoctuaInternalSDK.podspec sdk/ios-sdk/release/NoctuaInternalSDK.podspec;
        git commit -m "bump version to $NEW_VERSION [skip ci]";
        git fetch "$REMOTE_URL" $CI_COMMIT_BRANCH;
        git rebase FETCH_HEAD;
        git push "$REMOTE_URL" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip;
      else
        echo "No version bump required";
      fi

# ==================== Android SDK Pipeline ====================

deploy-android-sdk:
  image: cimg/android:2024.07.1
  stage: deploy
  needs:
    - job: bump-version-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: on_success
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - git fetch origin
    - git checkout origin/$CI_COMMIT_BRANCH
    - bash gradlew :sdk:publishAllPublicationsToGitLabRepository --no-configuration-cache

release-android-sdk:
  image:
    name: alpine/git
    entrypoint: [""]
  stage: release
  needs:
    - job: deploy-android-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
    GITHUB_TOKEN: $GITHUB_ACCESS_TOKEN
  before_script:
    - apk add git-cliff sed
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"
    - git fetch origin --tags
    - git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH
  script:
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="android-sdk-v${SDK_VERSION}"
    - git-cliff --repository "." --include-path "sdk/**" --tag-pattern "android-sdk-v.*" --bump > CHANGELOG.md
    - git add CHANGELOG.md
    - git commit -m "Release $NEW_VERSION_TAG"
    - git tag -a $NEW_VERSION_TAG -m "Release $NEW_VERSION_TAG"
    - git pull --rebase origin $CI_COMMIT_BRANCH
    - git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip

publish-android-sdk:
  image: cimg/android:2024.07.1
  stage: publish
  needs:
    - job: release-android-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
    GITHUB_TOKEN: $GITHUB_ACCESS_TOKEN
  script:
    - git fetch --tags
    - git checkout origin/$CI_COMMIT_BRANCH
    - bash gradlew :sdk:publishMavenPublicationToMavenCentralRepository --no-configuration-cache
    - wget "https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz"
    - tar -xvf git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz
    - cp ./git-cliff-2.4.0/git-cliff /usr/local/bin/
    - chmod +x /usr/local/bin/git-cliff
    - git-cliff --repository "." --include-path "sdk/**" --tag-pattern "android-sdk-v.*" --latest > GithubRelease.md
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="android-sdk-v${SDK_VERSION}"
    - cp ./sdk/build/outputs/aar/sdk-release.aar "./noctua-$NEW_VERSION_TAG.aar"
    # Following UPM SDK pattern: install gh, auth, setup-git, push via named remote
    - curl -sS https://webi.sh/gh | sh
    - source ~/.config/envman/PATH.env
    - gh auth status >/dev/null 2>&1 || echo "$GITHUB_ACCESS_TOKEN" | gh auth login --with-token
    - gh auth setup-git
    - git remote add github https://github.com/NoctuaLabs/noctua-internal-native-sdk.git || true
    - git push github HEAD:main --follow-tags -f
    - gh release create $NEW_VERSION_TAG --title $NEW_VERSION_TAG --notes-file GithubRelease.md "./noctua-$NEW_VERSION_TAG.aar" --latest
    - git remote remove github || true

# ==================== iOS SDK Pipeline ====================

build-and-publish-ios-sdk:
  stage: publish
  tags:
    - macmini
  needs:
    - job: bump-version-sdk
      optional: true
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  before_script:
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"
    - git fetch origin --tags
    - git checkout -B $CI_COMMIT_BRANCH origin/$CI_COMMIT_BRANCH
  script:
    # ---- Build XCFramework ----
    - ./gradlew podPublishReleaseXCFramework
    # podPublishReleaseXCFramework regenerates the podspec with vendored_frameworks
    # relative to the podspec file ('NoctuaInternalSDK.xcframework'). CocoaPods
    # evaluates this path against the repo root when cloning via :git, so it must
    # be the full repo-relative path.
    - sed -i "" "s|'NoctuaInternalSDK.xcframework'|'sdk/ios-sdk/release/NoctuaInternalSDK.xcframework'|" sdk/ios-sdk/release/NoctuaInternalSDK.podspec
    - cd sdk/ios-sdk/release
    - zip -r NoctuaInternalSDK.xcframework.zip NoctuaInternalSDK.xcframework
    - cd "$CI_PROJECT_DIR"
    # ---- Commit artifacts ----
    - git add sdk/ios-sdk/release/
    - |
      if [ -n "$(git diff --cached --name-only)" ]; then
        git commit -m "build: update iOS XCFramework artifacts [skip ci]"
      else
        echo "No changes to iOS XCFramework artifacts"
      fi
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="ios-sdk-v${SDK_VERSION}"
    - echo "Releasing $NEW_VERSION_TAG"
    - git pull --rebase origin $CI_COMMIT_BRANCH
    # ---- Set up gh CLI following UPM SDK pattern ----
    # gh auth setup-git handles credentials for both GitHub pushes and pod repo push
    # to the private Specs repo (both are github.com). Clean up in after_script so
    # the token never outlives the job on the shared macmini runner.
    - curl -sS https://webi.sh/gh | sh
    - source ~/.config/envman/PATH.env
    - gh auth status >/dev/null 2>&1 || echo "$GITHUB_ACCESS_TOKEN" | gh auth login --with-token
    - gh auth setup-git
    - git remote add github https://github.com/NoctuaLabs/noctua-internal-native-sdk.git || true
    # ---- Push commits to both remotes BEFORE tagging ----
    # Guarantees the xcframework is on GitHub before the tag is created.
    # pod repo push clones from GitHub at the tag — if the tag predates the
    # xcframework commit (e.g. from a previous failed run), CocoaPods can't find it.
    - git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH -o ci.skip
    - git push github HEAD:main -f
    # ---- Tag after xcframework commit is confirmed on both remotes ----
    # -f allows retrying the job without manually deleting the tag first
    - git tag -f -a $NEW_VERSION_TAG -m "Release $NEW_VERSION_TAG"
    - git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" "refs/tags/$NEW_VERSION_TAG" -o ci.skip
    - git push github "refs/tags/$NEW_VERSION_TAG" -f
    # ---- Publish to CocoaPods private repo ----
    - pod repo add noctua-specs https://github.com/NoctuaLabs/Specs.git 2>/dev/null || pod repo update noctua-specs
    - pod repo push noctua-specs sdk/ios-sdk/release/NoctuaInternalSDK.podspec --allow-warnings
    # ---- Create GitHub release with XCFramework zip ----
    - echo "Release $NEW_VERSION_TAG" > GithubRelease-ios.md
    - gh release create $NEW_VERSION_TAG --title $NEW_VERSION_TAG --notes-file GithubRelease-ios.md "sdk/ios-sdk/release/NoctuaInternalSDK.xcframework.zip" --latest
    - git remote remove github || true
  after_script:
    # Runs even on failure: log out of gh so the token never lingers on the shared runner
    - source ~/.config/envman/PATH.env 2>/dev/null || true
    - gh auth logout --hostname github.com || true
