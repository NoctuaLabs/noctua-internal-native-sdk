stages:
  - test
  - bump-version
  - build
  - deploy
  - release
  - publish

# Helper function: read sdk.version from gradle.properties
# Usage: source .ci-helpers.sh && get_sdk_version → sets $SDK_VERSION
# Inline: SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')

.bump-version:
  image:
    name: alpine/git
    entrypoint: [""]
  before_script:
    - apk add git-cliff sed
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"

test-android-sdk:
  image: cimg/android:2024.07.1
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"
      changes:
        - sdk/**
      when: always
  script:
    - bash gradlew check

bump-version-android-sdk:
  extends: .bump-version
  stage: bump-version
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - NEW_VERSION_TAG=$(git-cliff --repository "." --include-path "sdk/**" --tag-pattern "android-sdk-v.*" --bumped-version)
    - NEW_VERSION=$(echo $NEW_VERSION_TAG | sed -r "s/android-sdk-v(.*)/\1/")
    - sed -i "s/^sdk\.version=.*/sdk.version=$NEW_VERSION/" gradle.properties
    - if [ -n "$(git diff --name-only HEAD -- ./gradle.properties)" ]; then
      echo "Bumping version to $NEW_VERSION";
      git add gradle.properties;
      git commit -m "bump version to $NEW_VERSION [skip ci]";
      git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip;
      else
      echo "No version bump required";
      fi

deploy-android-sdk:
  image: cimg/android:2024.07.1
  stage: deploy
  needs:
    - job: bump-version-android-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: on_success
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - git fetch origin
    - git checkout origin/$CI_COMMIT_BRANCH
    - bash gradlew :sdk:publishAllPublicationsToGitLabRepository --no-configuration-cache

release-android-sdk:
  extends: .bump-version
  stage: release
  needs:
    - job: deploy-android-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - git fetch --tags
    - git checkout origin/$CI_COMMIT_BRANCH
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="android-sdk-v${SDK_VERSION}"
    - git-cliff --repository "." --include-path "sdk/**" --tag-pattern "android-sdk-v.*" --bump > CHANGELOG.md
    - git add CHANGELOG.md
    - git commit -m "Release $NEW_VERSION_TAG"
    - git tag -a $NEW_VERSION_TAG -m "Release $NEW_VERSION_TAG"
    - git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip

publish-android-sdk:
  image: cimg/android:2024.07.1
  stage: publish
  needs:
    - job: release-android-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: on_success
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - git fetch --tags
    - git checkout origin/$CI_COMMIT_BRANCH
    - bash gradlew :sdk:publishMavenPublicationToMavenCentralRepository --no-configuration-cache
    - wget "https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz"
    - tar -xvf git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz
    - cp ./git-cliff-2.4.0/git-cliff /usr/local/bin/
    - chmod +x /usr/local/bin/git-cliff
    - git-cliff --repository "." --include-path "sdk/**" --tag-pattern "android-sdk-v.*" --latest > GithubRelease.md
    - curl -sS https://webi.sh/gh | sh
    - source ~/.config/envman/PATH.env
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="android-sdk-v${SDK_VERSION}"
    - cp ./sdk/build/outputs/aar/sdk-release.aar "./noctua-$NEW_VERSION_TAG.aar"
    - echo $GITHUB_ACCESS_TOKEN | gh auth login --with-token
    - git remote add github https://github.com/NoctuaLabs/noctua-internal-native-sdk.git || true
    - git push github HEAD:main --follow-tags -f
    - gh release create $NEW_VERSION_TAG --title $NEW_VERSION_TAG --notes-file GithubRelease.md "./noctua-$NEW_VERSION_TAG.aar"
    - git remote remove github

# ==================== iOS SDK Pipeline ====================

bump-version-ios-sdk:
  extends: .bump-version
  stage: bump-version
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - NEW_VERSION_TAG=$(git-cliff --repository "." --include-path "sdk/**" --tag-pattern "ios-sdk-v.*" --bumped-version)
    - NEW_VERSION=$(echo $NEW_VERSION_TAG | sed -r "s/ios-sdk-v(.*)/\1/")
    - sed -i "s/^sdk\.version=.*/sdk.version=$NEW_VERSION/" gradle.properties
    - if [ -n "$(git diff --name-only HEAD -- ./gradle.properties)" ]; then
      echo "Bumping iOS version to $NEW_VERSION";
      git add gradle.properties;
      git commit -m "bump iOS version to $NEW_VERSION [skip ci]";
      git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip;
      else
      echo "No version bump required";
      fi

build-ios-sdk:
  stage: build
  tags:
    - macmini
  needs:
    - job: bump-version-ios-sdk
      optional: true
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - git fetch origin
    - git checkout origin/$CI_COMMIT_BRANCH
    - ./gradlew podPublishReleaseXCFramework
    - cd sdk/ios-sdk/release
    - zip -r NoctuaInternalSDK.xcframework.zip NoctuaInternalSDK.xcframework
    - cd "$CI_PROJECT_DIR"
    - git add sdk/ios-sdk/release/
    - |
      if [ -n "$(git diff --cached --name-only)" ]; then
        git config user.email "gitlab-ci@noctua.gg"
        git config user.name "Noctua Gitlab CI"
        git commit -m "build: update iOS XCFramework artifacts [skip ci]"
        git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH -o ci.skip
      else
        echo "No changes to iOS XCFramework artifacts"
      fi

release-ios-sdk:
  stage: release
  tags:
    - macmini
  needs:
    - job: build-ios-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: manual
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  before_script:
    - git config --global user.email "gitlab-ci@noctua.gg"
    - git config --global user.name "Noctua Gitlab CI"
  script:
    - git fetch origin --tags
    - git checkout origin/$CI_COMMIT_BRANCH
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="ios-sdk-v${SDK_VERSION}"
    - echo "Releasing $NEW_VERSION_TAG"
    - |
      sed -i '' "s/spec.version.*=.*/spec.version                  = '$SDK_VERSION'/" sdk/ios-sdk/release/NoctuaInternalSDK.podspec
      sed -i '' "s|spec.source.*=.*|spec.source                   = { :git => 'https://github.com/NoctuaLabs/noctua-internal-native-sdk.git', :tag => '$NEW_VERSION_TAG' }|" sdk/ios-sdk/release/NoctuaInternalSDK.podspec
    - git add sdk/ios-sdk/release/NoctuaInternalSDK.podspec
    - |
      if [ -n "$(git diff --cached --name-only)" ]; then
        git commit -m "Release $NEW_VERSION_TAG"
      fi
    - git tag -a $NEW_VERSION_TAG -m "Release $NEW_VERSION_TAG"
    - git push "https://$GITLAB_BUILDER_USER:$GITLAB_BUILDER_ACCESS_TOKEN@gitlab.com/evosverse/noctua/noctua-internal-native-sdk.git" HEAD:$CI_COMMIT_BRANCH --follow-tags -o ci.skip

publish-ios-sdk:
  stage: publish
  tags:
    - macmini
  needs:
    - job: release-ios-sdk
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - sdk/**
      when: on_success
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: 0
  script:
    - git fetch --tags
    - git checkout origin/$CI_COMMIT_BRANCH
    - git config --global credential.helper "!f() { echo username=oauth2; echo password=$GITHUB_ACCESS_TOKEN; }; f"
    - pod repo add noctua-specs https://github.com/NoctuaLabs/Specs.git 2>/dev/null || pod repo update noctua-specs
    - pod repo push noctua-specs sdk/ios-sdk/release/NoctuaInternalSDK.podspec --allow-warnings
    - SDK_VERSION=$(grep '^sdk\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
    - NEW_VERSION_TAG="ios-sdk-v${SDK_VERSION}"
    - echo "Release $NEW_VERSION_TAG" > GithubRelease-ios.md
    - echo $GITHUB_ACCESS_TOKEN | gh auth login --with-token
    - git remote add github https://github.com/NoctuaLabs/noctua-internal-native-sdk.git || true
    - git push github HEAD:main --follow-tags -f
    - gh release create $NEW_VERSION_TAG --title $NEW_VERSION_TAG --notes-file GithubRelease-ios.md "sdk/ios-sdk/release/NoctuaInternalSDK.xcframework.zip"
    - git remote remove github
