name: NoctuaSDKExample
options:
  bundleIdPrefix: com.noctuagames.sdk.example
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noctuagames.ios.sdktest
        INFOPLIST_FILE: iosApp/Info.plist
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../examples/composeApp/build/bin/iosArm64/debugFramework"
          - "$(SRCROOT)/../examples/composeApp/build/bin/iosSimulatorArm64/debugFramework"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-framework"
          - "ComposeApp"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        CODE_SIGN_STYLE: Automatic
    dependencies: []
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          if [ "$PLATFORM_NAME" = "iphonesimulator" ]; then
            ./gradlew :examples:composeApp:linkDebugFrameworkIosSimulatorArm64
          else
            ./gradlew :examples:composeApp:linkDebugFrameworkIosArm64
          fi
        basedOnDependencyAnalysis: false
